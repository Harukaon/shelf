<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shelf</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <div id="window-resize-n" class="window-resize-zone" data-resize-direction="North"></div>
    <div id="window-resize-e" class="window-resize-zone" data-resize-direction="East"></div>
    <div id="window-resize-s" class="window-resize-zone" data-resize-direction="South"></div>
    <div id="window-resize-w" class="window-resize-zone" data-resize-direction="West"></div>
    <div id="window-resize-ne" class="window-resize-zone" data-resize-direction="NorthEast"></div>
    <div id="window-resize-nw" class="window-resize-zone" data-resize-direction="NorthWest"></div>
    <div id="window-resize-se" class="window-resize-zone" data-resize-direction="SouthEast"></div>
    <div id="window-resize-sw" class="window-resize-zone" data-resize-direction="SouthWest"></div>
    <div id="tab-bar">
      <div id="tab-list"></div>
      <div id="tab-drag-zone"></div>
      <button id="tab-add-btn" title="New terminal / session">+</button>
      <button id="settings-btn" title="Settings">⚙</button>
      <div id="window-controls">
        <button id="win-minimize" title="Minimize" aria-label="Minimize"><i data-lucide="minus"></i></button>
        <button id="win-maximize" title="Maximize" aria-label="Maximize"><i data-lucide="square"></i></button>
        <button id="win-close" title="Close" aria-label="Close"><i data-lucide="x"></i></button>
      </div>
    </div>
    <div id="main-content">
      <div id="left-panel">
        <div id="workspace-list"></div>
        <div id="left-panel-bottom">
          <button id="add-workspace-btn">+ Add Workspace</button>
          <button id="refresh-sessions-btn"><span>↻</span></button>
        </div>
      </div>
      <div id="resize-handle-left"></div>
      <div id="center-panel">
        <div id="terminal-container"></div>
      </div>
      <div id="resize-handle-right"></div>
      <div id="right-panel">
        <div id="file-tree"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/app.ts"></script>
</body>
</html>
