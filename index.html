<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shelf</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <div id="tab-bar">
      <div id="tab-list"></div>
      <button id="tab-add-btn" title="Open session">+</button>
    </div>
    <div id="main-content">
      <div id="left-panel">
        <div id="workspace-list"></div>
        <button id="add-workspace-btn">+ Add Workspace</button>
      </div>
      <div id="center-panel">
        <div id="terminal-container">
          <div id="terminal-drop-overlay"></div>
        </div>
      </div>
      <div id="right-panel">
        <div id="file-tree"></div>
      </div>
    </div>
    <div id="status-bar">
      <span>Tab: Switch  |  Ctrl+Click: Select Workspace  |  R: Rename Session</span>
    </div>
  </div>

  <script type="module" src="/src/app.ts"></script>
</body>
</html>
