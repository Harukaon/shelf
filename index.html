<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shelf</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <div id="tab-bar">
      <div id="tab-list"></div>
      <button id="tab-add-btn" title="New terminal / session">+</button>
      <button id="settings-btn" title="Settings">⚙</button>
      <div id="window-controls">
        <button id="win-minimize" aria-label="Minimize">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="2" rx="1" fill="currentColor"/></svg>
        </button>
        <button id="win-maximize" aria-label="Maximize">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
        <button id="win-close" aria-label="Close">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <div id="main-content">
      <div id="left-panel">
        <div id="workspace-list"></div>
        <div id="left-panel-bottom">
          <button id="add-workspace-btn">+ Add Workspace</button>
          <button id="refresh-sessions-btn"><span>↻</span></button>
        </div>
      </div>
      <div id="resize-handle-left"></div>
      <div id="center-panel">
        <div id="terminal-container"></div>
      </div>
      <div id="resize-handle-right"></div>
      <div id="right-panel">
        <div id="file-tree"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/app.ts"></script>
</body>
</html>
