<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89B4FA"/>
      <stop offset="100%" stop-color="#74C7EC"/>
    </linearGradient>
  </defs>
  <!-- Outer rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="#1E1E2E"/>
  <!-- Terminal prompt bracket -->
  <text x="100" y="320" font-family="SF Mono, Menlo, monospace" font-size="260" font-weight="700" fill="url(#g1)">&gt;_</text>
  <!-- Three shelf lines (representing stacked terminal tabs) -->
  <rect x="100" y="370" width="312" height="10" rx="5" fill="#45475A" opacity="0.6"/>
  <rect x="140" y="400" width="232" height="10" rx="5" fill="#45475A" opacity="0.4"/>
  <rect x="170" y="430" width="172" height="10" rx="5" fill="#45475A" opacity="0.25"/>
</svg>
